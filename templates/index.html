<!DOCTYPE html>
<html>
<head>
    <title>Eco-Awareness 2026</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <h1>Eco-Awareness <span>2026</span></h1>
        
        <div class="input-group">
            <label>ID do Evento de Auditoria</label>
            <input type="number" id="eventoId" value="1">
        </div>

        <button class="btn-primary" onclick="botaoProcessar()">Processar para este ID</button>

        <table>
            <thead><tr><th>REF</th><th>Nome</th><th>Saldo</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>

        <button class="btn-reset" onclick="botaoReset()">⚠ Reiniciar Ciclo (R$ 100)</button>
    </div>

    <script>
        function carregar() {
            fetch('/usuarios').then(r => r.json()).then(data => {
                document.getElementById('lista').innerHTML = data.map(u => 
                    `<tr><td>#${u.id}</td><td>${u.nome}</td><td style="color:#ffcc00">R$ ${u.saldo}</td></tr>`
                ).join('');
            });
        }

        function botaoProcessar() {
            const id = document.getElementById('eventoId').value;
            fetch('/distribuir', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id_evento: parseInt(id) })
            }).then(r => r.json()).then(data => {
                alert(data.message);
                carregar();
            });
        }

        function botaoReset() {
            if(!confirm("Resetar?")) return;
            fetch('/reset', {method: 'POST'}).then(r => r.json()).then(data => {
                alert(data.message);
                carregar();
            });
        }
        window.onload = carregar;
    </script>
</body>
</html>
