<!DOCTYPE html>
<html>
<head>
    <title>Eco-Awareness 2026</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <h1>Eco-Awareness <span>2026</span></h1>
        
        <div class="input-group">
            <label>ID do Evento de Auditoria</label>
            <input type="number" id="eventoId" value="1">
        </div>

        <button class="btn-primary" onclick="botaoProcessar()">Processar para este ID</button>

        <table>
            <thead><tr><th>REF</th><th>Nome</th><th>Saldo</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>

        <button class="btn-reset" onclick="botaoReset()">⚠ Reiniciar Ciclo (R$ 100)</button>
    </div>

    <button class="btn-primary" id="btnDistribuir" onclick="distribuir()">Processar para este ID</button>

<button class="btn-reset" id="btnReset" onclick="resetar()">⚠ Reiniciar Ciclo (R$ 100)</button>

<script>
    function carregar() {
        fetch('/usuarios').then(r => r.json()).then(data => {
            const tbody = document.getElementById('lista') || document.querySelector('tbody');
            tbody.innerHTML = data.map(u => `
                <tr>
                    <td>#${u.id}</td>
                    <td>${u.nome}</td>
                    <td style="text-align:right; color:#00ff88; font-weight:bold;">R$ ${u.saldo}</td>
                </tr>
            `).join('');
        });
    }

    // FUNÇÃO DO BOTAO PROCESSAR
    function distribuir() {
        const id = document.getElementById('eventoId').value;
        const btn = document.getElementById('btnDistribuir');
        
        btn.disabled = true;
        btn.innerText = "Processando...";

        fetch('/distribuir', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id_evento: parseInt(id) })
        })
        .then(r => r.json())
        .then(data => {
            alert(data.message);
            carregar();
        })
        .catch(() => alert("Erro ao conectar com o servidor"))
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "Processar para este ID";
        });
    }

    // FUNÇÃO DO BOTAO RESET
    function resetar() {
        if(!confirm("Deseja resetar todos os saldos para R$ 100,00?")) return;
        fetch('/reset', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            alert(data.message);
            carregar();
        });
    }

    window.onload = carregar;
</script>
</body>
</html>
