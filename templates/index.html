<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Eco-Awareness 2026 | Cashback</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="card">
    <div class="header">
        <h1>Eco-Awareness <span>2026</span></h1>
    </div>

    <div class="input-group">
        <label>ID do Evento de Auditoria</label>
        <input type="number" id="eventoId" value="1">
    </div>

    <button class="btn-primary" id="btnRun" onclick="distribuir()">Processar para este ID</button>
    <div class="divider"></div>

    <table>
        <thead>
            <tr><th>REF</th><th>Nome</th><th style="text-align:right">Saldo</th></tr>
        </thead>
        <tbody id="tabela-usuarios"></tbody>
    </table>

    <button class="btn-reset" onclick="resetar()">⚠ Reiniciar Ciclo (R$ 100)</button>
</div>

<script>
    function carregar() {
        fetch('/usuarios').then(r => r.json()).then(data => {
            const tbody = document.getElementById('tabela-usuarios');
            tbody.innerHTML = data.map(u => `
                <tr>
                    <td>#${u.id}</td>
                    <td>${u.nome}</td>
                    <td style="text-align:right; color:var(--primary)">R$ ${u.saldo}</td>
                </tr>
            `).join('');
        });
    }

    function distribuir() {
        const idInput = document.getElementById('eventoId').value;
        const btn = document.getElementById('btnRun');
        
        btn.disabled = true;
        btn.textContent = 'Processando...';

        fetch('/distribuir', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id_evento: Number(idInput) })
        })
        .then(r => r.json())
        .then(data => {
            alert(data.message);
            carregar();
        })
        .catch(() => alert("Erro no servidor."))
        .finally(() => {
            btn.disabled = false;
            btn.textContent = 'Processar para este ID';
        });
    }

    function resetar() {
        if(!confirm("Resetar para R$ 100?")) return;
        fetch('/reset', {method: 'POST'}).then(r => r.json()).then(data => {
            alert(data.message);
            carregar();
        });
    }
    window.onload = carregar;
</script>
</body>
</html>
