<!DOCTYPE html>
<html>
<head>
    <title>Eco-Awareness 2026</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <h1>Eco-Awareness <span>2026</span></h1>
        
        <div class="input-group">
            <label>ID do Evento de Auditoria</label>
            <input type="number" id="eventoId" value="1">
        </div>

        <button class="btn-primary" onclick="botaoProcessar()">Processar para este ID</button>

        <table>
            <thead><tr><th>REF</th><th>Nome</th><th>Saldo</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>

        <button class="btn-reset" onclick="botaoReset()">⚠ Reiniciar Ciclo (R$ 100)</button>
    </div>

    <button class="btn-primary" id="btnDistribuir" onclick="distribuir()">Processar para este ID</button>

<button class="btn-reset" id="btnReset" onclick="resetar()">⚠ Reiniciar Ciclo (R$ 100)</button>

<script>
    function carregarUsuarios() {
        fetch('/usuarios')
            .then(r => r.json())
            .then(data => {
                const lista = document.getElementById('lista') || document.querySelector('tbody');
                lista.innerHTML = data.map(u => `
                    <tr>
                        <td>#${u.id}</td>
                        <td>${u.nome}</td>
                        <td style="text-align:right; color:#00ff88; font-weight:bold;">R$ ${u.saldo}</td>
                    </tr>
                `).join('');
            });
    }

    // FUNÇÃO DO BOTAO PROCESSAR
    function distribuir() {
        const idCampo = document.getElementById('eventoId');
        const btn = document.getElementById('btnDistribuir');
        const idValor = parseInt(idCampo.value);

        if (isNaN(idValor)) {
            alert("Por favor, digite um número de ID válido.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Processando...";

        fetch('/distribuir', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id_evento: idValor })
        })
        .then(response => {
            if (!response.ok) throw new Error("Erro no servidor");
            return response.json();
        })
        .then(data => {
            alert(data.message);
            carregarUsuarios(); // Atualiza os saldos na tela
        })
        .catch(error => {
            alert("Erro: O ID " + idValor + " não foi encontrado ou está ausente.");
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "Processar para este ID";
        });
    }

    // FUNÇÃO DO BOTAO RESET
    function resetar() {
        if(!confirm("Resetar todos os saldos para R$ 100?")) return;
        fetch('/reset', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                alert(data.message);
                carregarUsuarios();
            });
    }

    window.onload = carregar;
</script>
</body>
</html>
