<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Awareness 2026 | Cashback</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="card">
        <span class="badge">Fidelidade & Bônus</span>
        
        <h1>Eco-Awareness 2026</h1>
        <p>Programa de Cashback Progressivo para ativistas.</p>
        
        <div class="input-group">
            <label for="eventoId">ID DO EVENTO FINALIZADO</label>
            <input type="number" id="eventoId" placeholder="Ex: 3" value="1">
        </div>

        <button id="btnDistribuir" onclick="distribuir()">
            Distribuir Créditos de Cashback
        </button>

        <div class="status-container">
            <h3>Saldos Atuais dos Participantes</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Participante</th>
                        <th>Tipo</th>
                        <th style="text-align: center;">Pres.</th>
                        <th style="text-align: right;">Saldo</th>
                    </tr>
                </thead>
                <tbody id="tabela-usuarios">
                    </tbody>
            </table>

            <button id="btnReset" onclick="resetar()" class="secondary-button">
                Resetar Sistema
            </button>
        </div>
    </div>

    <script>
        function carregarUsuarios() {
            fetch('/usuarios')
                .then(res => res.json())
                .then(data => {
                    const corpoTabela = document.getElementById('tabela-usuarios');
                    corpoTabela.innerHTML = ''; 
                    data.forEach(u => {
                        const corTipo = u.tipo === 'VIP' ? '#ff0066' : '#666';
                        corpoTabela.innerHTML += `
                            <tr>
                                <td class="td-id">#${u.id}</td>
                                <td class="td-nome">${u.nome}</td>
                                <td><span style="color: ${corTipo}; font-size: 10px; font-weight: bold;">${u.tipo}</span></td>
                                <td style="text-align: center; color: #888;">${u.presencas}</td>
                                <td class="td-saldo">R$ ${u.saldo}</td>
                            </tr>
                        `;
                    });
                });
        }

        function distribuir() {
        const userId = document.getElementById('usuarioId').value;
        if (!userId) {
            alert("Por favor, insira um ID de usuário.");
            return;
        }

        const btn = document.getElementById('btnDistribuir');
        btn.innerText = "Processando...";
        btn.disabled = true;

        fetch('/distribuir', { 
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: userId }) // Envia o ID no corpo
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            carregarUsuarios();
        })
        .finally(() => {
            btn.innerText = "Aplicar Cashback no ID";
            btn.disabled = false;
        });
    }

        function resetar() {
            if(!confirm("Deseja resetar os saldos para R$ 100.00 e limpar logs?")) return;
            fetch('/reset', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                carregarUsuarios();
            });
        }

        window.onload = carregarUsuarios;
    </script>
</body>
</html>
