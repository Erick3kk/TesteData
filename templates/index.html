<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Eco-Awareness 2026 | Cashback</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Eco-Awareness <span>2026</span></h1>
        <p class="subtitle">Gestão de Créditos Individuais</p>
    </div>

    <div class="input-group">
        <label>ID do Evento de Auditoria</label>
        <input type="number" id="eventoId" value="1">
    </div>

    <button class="btn-primary" onclick="distribuir()">Processar para este ID</button>

    <div class="divider"></div>

    <table id="tabela-simples">
        <thead>
            <tr>
                <th>REF</th>
                <th>Nome</th>
                <th style="text-align:right">Saldo</th>
            </tr>
        </thead>
        <tbody id="tabela-usuarios"></tbody>
    </table>

    <button class="btn-secondary" onclick="resetar()">⚠ Reiniciar Ciclo de Dados</button>
</div>

<script>
    function carregar() {
        fetch('/usuarios').then(r => r.json()).then(data => {
            const tbody = document.getElementById('tabela-usuarios');
            tbody.innerHTML = data.map(u => `
                <tr>
                    <td>#${u.id}</td>
                    <td>${u.nome}</td>
                    <td style="text-align:right; color:var(--primary)">R$ ${u.saldo}</td>
                </tr>
            `).join('');
        });
    }

    function distribuir() {
        const id = document.getElementById('eventoId').value;
        fetch('/distribuir', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id_evento: id})
        }).then(r => r.json()).then(data => {
            alert(data.message);
            carregar();
        });
    }

    function resetar() {
        if(!confirm("Deseja zerar os saldos?")) return;
        fetch('/reset', {method: 'POST'}).then(r => r.json()).then(data => {
            alert(data.message);
            carregar();
        });
    }

    window.onload = carregar;
</script>
</body>
</html>
